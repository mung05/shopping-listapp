<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    .header {
      background: #4f46e5;
      padding: 24px;
      color: #fff;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .header .summary {
      font-size: 13px;
      opacity: 0.8;
    }

    .input-area {
      padding: 20px 24px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #4f46e5;
    }

    .input-area input::placeholder {
      color: #9ca3af;
    }

    .btn-add {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 15px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-add:hover {
      background: #4338ca;
    }

    .list-area {
      padding: 16px 24px;
      min-height: 120px;
    }

    .empty-msg {
      text-align: center;
      color: #9ca3af;
      font-size: 14px;
      padding: 40px 0;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f3f4f6;
      animation: slideIn 0.2s ease;
    }

    .item:last-child {
      border-bottom: none;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 15px;
      color: #111827;
      transition: color 0.2s;
      word-break: break-all;
    }

    .item.done .item-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #d1d5db;
      font-size: 18px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }

    .btn-delete:hover {
      color: #ef4444;
      background: #fef2f2;
    }

    .footer {
      padding: 16px 24px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer .count {
      font-size: 13px;
      color: #6b7280;
    }

    .btn-clear {
      background: none;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      font-family: inherit;
      color: #6b7280;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-clear:hover {
      border-color: #ef4444;
      color: #ef4444;
    }

    .btn-clear:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>🛒 쇼핑 리스트</h1>
      <div class="summary" id="summary">항목을 추가해 보세요</div>
    </div>

    <div class="input-area">
      <input type="text" id="itemInput" placeholder="추가할 항목 입력..." maxlength="50">
      <button class="btn-add" onclick="addItem()">추가</button>
    </div>

    <div class="list-area" id="listArea">
      <div class="empty-msg" id="emptyMsg">리스트가 비어 있어요</div>
    </div>

    <div class="footer">
      <span class="count" id="countText">0개 항목</span>
      <button class="btn-clear" id="btnClear" onclick="clearDone()" disabled>완료 항목 삭제</button>
    </div>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shoppingList') || '[]');

    const input = document.getElementById('itemInput');
    const listArea = document.getElementById('listArea');
    const emptyMsg = document.getElementById('emptyMsg');
    const summary = document.getElementById('summary');
    const countText = document.getElementById('countText');
    const btnClear = document.getElementById('btnClear');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    function save() {
      localStorage.setItem('shoppingList', JSON.stringify(items));
    }

    function addItem() {
      const text = input.value.trim();
      if (!text) return;
      items.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (item) item.done = !item.done;
      save();
      render();
    }

    function deleteItem(id) {
      items = items.filter(i => i.id !== id);
      save();
      render();
    }

    function clearDone() {
      items = items.filter(i => !i.done);
      save();
      render();
    }

    function render() {
      const total = items.length;
      const done = items.filter(i => i.done).length;

      emptyMsg.style.display = total === 0 ? 'block' : 'none';

      const existingItems = listArea.querySelectorAll('.item');
      existingItems.forEach(el => el.remove());

      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'item' + (item.done ? ' done' : '');
        div.innerHTML = `
          <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleItem(${item.id})">
          <span class="item-text">${escapeHtml(item.text)}</span>
          <button class="btn-delete" onclick="deleteItem(${item.id})" title="삭제">✕</button>
        `;
        listArea.appendChild(div);
      });

      countText.textContent = `${total}개 항목`;
      btnClear.disabled = done === 0;

      if (total === 0) {
        summary.textContent = '항목을 추가해 보세요';
      } else if (done === total) {
        summary.textContent = '모두 완료! 🎉';
      } else {
        summary.textContent = `${total}개 중 ${done}개 완료`;
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    render();
  </script>
</body>
</html>
